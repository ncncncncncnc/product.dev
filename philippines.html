<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>After You - PH Portal</title>
    <link rel="icon" type="image/png" href="logo.png">
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@700&family=Anuphan:wght@600;700&display=swap" rel="stylesheet">
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: #ffffff;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        /* 🐏 โลโก้แบรนด์ด้านบนสุด */
        .logo-container {
            margin-bottom: 50px;
            text-align: center;
        }

        .logo-img {
            width: 120px;
            height: auto;
        }

        /* 🥞 กล่องจัดวางรูปสี่เหลี่ยมจัตุรัส 2 ฝั่ง ซ้าย-ขวา */
        .portal-grid {
            display: flex;
            gap: 60px;
            justify-content: center;
            align-items: center;
            flex-wrap: wrap;
            max-width: 1000px;
            width: 100%;
        }

        /* 🔳 สไตล์รูปสี่เหลี่ยมจัตุรัสขอบมน (Square Tiles) */
        .thumb-card {
            width: 320px;
            height: 320px;
            aspect-ratio: 1 / 1;
            border-radius: 16px; /* ขอบมนละมุนตาเข้าเซ็ต */
            overflow: hidden;
            position: relative;
            text-decoration: none;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.06);
            cursor: pointer;
            transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .thumb-card:hover {
            transform: scale(1.04);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.12);
        }

        .thumb-img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            filter: brightness(0.80);
            transition: transform 0.4s ease;
        }

        .thumb-card:hover .thumb-img {
            transform: scale(1.06);
        }

        /* ✍️ ตัวหนังสือตรงกลางสี่เหลี่ยมขอบมน */
        .thumb-overlay-text {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: #ffffff;
            font-family: 'Anuphan', 'Plus Jakarta Sans', sans-serif;
            font-size: 36px;
            font-weight: 700;
            text-shadow: 0 2px 12px rgba(0, 0, 0, 0.6);
            text-align: center;
            width: 90%;
        }

        @media (max-width: 768px) {
            .portal-grid {
                gap: 40px;
                flex-direction: column;
            }
            .thumb-card {
                width: 260px;
                height: 260px;
            }
            .thumb-overlay-text {
                font-size: 30px;
            }
        }
    </style>
</head>
<body>

    <div class="logo-container">
        <!-- กดที่โลโก้แล้วถอยกลับไปหน้าหลักต่างประเทศค๊าา -->
        <a href="international.html"><img src="logo.png" alt="After You" class="logo-img"></a>
    </div>

    <div class="portal-grid">
        
        <!-- 📍 1. Location (ดึงไฟล์ภาพ PH_Location.jpg ค๊าา) -->
        <a href="#" class="thumb-card">
            <img src="PH_Location.jpg" alt="Location" class="thumb-img">
            <div class="thumb-overlay-text">Location</div>
        </a>

        <!-- 📜 2. Menu (ดึงไฟล์ภาพ PH_Menu.jpg ค๊าา) -->
        <a href="#" class="thumb-card">
            <img src="PH_Menu.jpg" alt="Menu" class="thumb-img">
            <div class="thumb-overlay-text">Menu</div>
        </a>

    </div>

</body>
</html>
