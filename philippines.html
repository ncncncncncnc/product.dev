<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>After You - PH Portal</title>
    <link rel="icon" type="image/png" href="logo.png">
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@500;600;700&family=Anuphan:wght@500;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: #ffffff;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        /* 🐏 โลโก้แบรนด์ด้านบนสุด */
        .logo-container {
            margin-bottom: 50px;
            text-align: center;
        }

        .logo-img {
            width: 120px;
            height: auto;
        }

        /* 🥞 กล่องจัดวางรูปสี่เหลี่ยมจัตุรัส 2 ฝั่ง ซ้าย-ขวา */
        .portal-grid {
            display: flex;
            gap: 60px;
            justify-content: center;
            align-items: center;
            flex-wrap: wrap;
            max-width: 1000px;
            width: 100%;
        }

        /* 🔳 สไตล์รูปสี่เหลี่ยมจัตุรัสขอบมน (Square Tiles) */
        .thumb-card {
            width: 320px;
            height: 320px;
            aspect-ratio: 1 / 1;
            border-radius: 16px;
            overflow: hidden;
            position: relative;
            text-decoration: none;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.06);
            cursor: pointer;
            transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .thumb-card:hover {
            transform: scale(1.04);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.12);
        }

        .thumb-img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            filter: brightness(0.80);
            transition: transform 0.4s ease;
        }

        .thumb-card:hover .thumb-img {
            transform: scale(1.06);
        }

        /* ✍️ ตัวหนังสือตรงกลางสี่เหลี่ยมขอบมน */
        .thumb-overlay-text {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: #ffffff;
            font-family: 'Anuphan', 'Plus Jakarta Sans', sans-serif;
            font-size: 36px;
            font-weight: 700;
            text-shadow: 0 2px 12px rgba(0, 0, 0, 0.6);
            text-align: center;
            width: 90%;
        }

        /* 🖼️ ระบบ Popup มินิมอล (Modal Overlay ทั้ง Menu และ Location) */
        .custom-modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.85);
            z-index: 9999;
            justify-content: center;
            align-items: center;
            padding: 20px;
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .custom-modal.active {
            display: flex;
            opacity: 1;
        }

        /* รูปภาพในหน้าจอ Popup Menu */
        .modal-content-img {
            max-width: 90%;
            max-height: 85vh;
            object-fit: contain;
            border-radius: 8px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.5);
            transform: scale(0.95);
            transition: transform 0.3s ease;
        }

        .custom-modal.active .modal-content-img {
            transform: scale(1);
        }

        /* 📍 กล่องข้อมูลรายชื่อสาขา Popup Location */
        .location-box {
            background-color: #ffffff;
            padding: 40px;
            border-radius: 16px;
            max-width: 500px;
            width: 100%;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.3);
            transform: scale(0.95);
            transition: transform 0.3s ease;
            font-family: 'Plus Jakarta Sans', 'Anuphan', sans-serif;
        }

        .custom-modal.active .location-box {
            transform: scale(1);
        }

        .location-title {
            font-size: 26px;
            font-weight: 700;
            color: #333333;
            margin-bottom: 25px;
            text-align: center;
            border-bottom: 2px solid #f5f5f5;
            padding-bottom: 15px;
        }

        .location-item {
            margin-bottom: 20px;
            padding-bottom: 15px;
            border-bottom: 1px dashed #eeeeee;
        }

        .location-item:last-child {
            margin-bottom: 0;
            padding-bottom: 0;
            border-bottom: none;
        }

        .branch-name {
            font-size: 16px;
            font-weight: 600;
            color: #444444;
            margin-bottom: 6px;
        }

        .map-link {
            display: inline-flex;
            align-items: center;
            color: #bfa15f; /* สีทองหม่นสไตล์คาเฟ่พรีเมียม */
            text-decoration: none;
            font-size: 14px;
            font-weight: 500;
            transition: color 0.2s;
        }

        .map-link:hover {
            color: #9e8243;
            text-decoration: underline;
        }

        /* ปุ่มกากบาท X ปิด */
        .close-btn {
            position: absolute;
            top: 25px;
            right: 35px;
            color: #ffffff;
            font-size: 40px;
            font-weight: 300;
            cursor: pointer;
            transition: color 0.2s;
            font-family: Arial, sans-serif;
            user-select: none;
        }

        @media (max-width: 768px) {
            .portal-grid {
                gap: 40px;
                flex-direction: column;
            }
            .thumb-card {
                width: 260px;
                height: 260px;
            }
            .thumb-overlay-text {
                font-size: 30px;
            }
            .location-box {
                padding: 25px 20px;
            }
            .location-title {
                font-size: 22px;
            }
        }
    </style>
</head>
<body>

    <div class="logo-container">
        <a href="international.html"><img src="logo.png" alt="After You" class="logo-img"></a>
    </div>

    <div class="portal-grid">
        
        <!-- 📍 1. Location (ปรับมาใช้ระบบเปิด Popup รายชื่อสาขาแล้วค๊าา) -->
        <div class="thumb-card" onclick="openModal('locationModal')">
            <img src="PH_Location.jpg" alt="Location" class="thumb-img">
            <div class="thumb-overlay-text">Location</div>
        </div>

        <!-- 📜 2. Menu -->
        <div class="thumb-card" onclick="openModal('menuModal')">
            <img src="PH_Menu.jpg" alt="Menu" class="thumb-img">
            <div class="thumb-overlay-text">Menu</div>
        </div>

    </div>

    <!-- 🌟 โครงสร้างหน้าต่างป๊อปอัพ Location ข้อมูลแน่นๆ ดูคลีนมินิมอล -->
    <div id="locationModal" class="custom-modal" onclick="closeModal('locationModal')">
        <span class="close-btn" onclick="closeModal('locationModal')">&times;</span>
        <div class="location-box" onclick="event.stopPropagation()">
            <div class="location-title">PH ONSITE LOCATIONS</div>
            
            <div class="location-item">
                <div class="branch-name">📍 SM Mall of Asia, L1</div>
                <a href="https://maps.app.goo.gl/VvFWBtbPA4qMupJFA" target="_blank" class="map-link">Find on map ↗</a>
            </div>

            <div class="location-item">
                <div class="branch-name">📍 Ayala Glorietta 1, G/F & L2</div>
                <a href="https://maps.app.goo.gl/usXqgdVrQaKRKniz9" target="_blank" class="map-link">Find on map ↗</a>
            </div>

            <div class="location-item">
                <div class="branch-name">📍 SM Mall North, EDSA & L2</div>
                <a href="https://maps.app.goo.gl/xuaBS92vMtUYd3Zr7" target="_blank" class="map-link">Find on map ↗</a>
            </div>

            <div class="location-item">
                <div class="branch-name">📍 Festival Mall</div>
                <a href="https://maps.app.goo.gl/Dv3ZpPRcuFvCdgbKA" target="_blank" class="map-link">Find on map ↗</a>
            </div>
        </div>
    </div>

    <!-- 🌟 โครงสร้างหน้าต่างป๊อปอัพภาพ Menu เหมือนเดิมค๊าา -->
    <div id="menuModal" class="custom-modal" onclick="closeModal('menuModal')">
        <span class="close-btn" onclick="closeModal('menuModal')">&times;</span>
        <img src="Menu_Board.jpg" alt="After You PH Menu Board" class="modal-content-img" onclick="event.stopPropagation()">
    </div>

    <!-- ⚡️ โค้ดควบคุมป๊อปอัพอเนกประสงค์ -->
    <script>
        function openModal(modalId) {
            const modal = document.getElementById(modalId);
            modal.style.display = 'flex';
            setTimeout(() => {
                modal.classList.add('active');
            }, 10);
            document.body.style.overflow = 'hidden';
        }

        function closeModal(modalId) {
            const modal = document.getElementById(modalId);
            modal.classList.remove('active');
            setTimeout(() => {
                modal.style.display = 'none';
            }, 300); // รอเอฟเฟกต์ fade-out จบค๊าา
            document.body.style.overflow = 'auto';
        }
    </script>

</body>
</html>
